<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test CSS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-box"></i> <span>Test</span></h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="active"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="#"><i class="fas fa-users"></i> <span>Users</span></a></li>
            </ul>
        </aside>
        
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-left">
                    <h1>Test Dashboard</h1>
                </div>
            </div>
            
            <div class="container">
                <div class="page-header">
                    <h2 class="page-title">Test Page</h2>
                    <p class="page-subtitle">Testing CSS Styles</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon primary">
                            <i class="fas fa-box"></i>
                        </div>
                        <div class="stat-details">
                            <h3>100</h3>
                            <p>Total Items</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon success">
                            <i class="fas fa-check"></i>
                        </div>
                        <div class="stat-details">
                            <h3>50</h3>
                            <p>Success</p>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Test Card</h3>
                    </div>
                    <div class="card-body">
                        <p>If you can see this styled properly, CSS is working!</p>
                        <button class="btn btn-primary">Primary Button</button>
                        <button class="btn btn-success">Success Button</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
